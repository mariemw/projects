<div class="tasks">
    <div class="add-new-task" (click)="show()">
        <span class="plus">+</span>
        <p>Nouvelle tache</p>
    </div>
    @for(task of tasks;track task.id){
        <div class="task-card">
            <div class="task-top">
                 <h3>{{task.title}}</h3>
                 <span class="status" [class.todo]="task.status === 'not started'">{{ task.status }}</span>
            </div> 
             <div class="task-body">
                <p class="task-description">{{ task.description }}</p>
            </div>
            <div class="task-footer"> 
                <button class="remove" (click)="deleteTask(projectId,task)">Supprimer</button>
            </div>
        </div>
    }
</div>

<div>
@if(showPopup){
    <div class="overlay">
        <div class="popup">
            <label>titre</label>
            <input type="text" placeholder="Entrer titre" [(ngModel)]="title">
            <label>description</label>
            <input type="text" placeholder="Entrer description" [(ngModel)]="description">
            <div class="popup-buttons">
            <button class="create-btn" (click)="addTask(projectId,title,description)">Créer</button>
      </div>
    </div>
    </div>
}
</div>
